name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-python: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Format + lint
        run: |
          uv run ruff format --check . &
          fmt_pid=$!
          uv run ruff check .
          ruff_rc=$?
          wait "$fmt_pid"
          fmt_rc=$?
          if [ "$ruff_rc" -ne 0 ] || [ "$fmt_rc" -ne 0 ]; then
            echo "ruff check=$ruff_rc, format=$fmt_rc"
            exit 1
          fi

      - name: Type check
        run: uv run mypy

      - name: Dead code + dependency hygiene
        run: |
          uv run vulture src/ --min-confidence 80 &
          vul_pid=$!
          uv run deptry .
          dep_rc=$?
          wait "$vul_pid"
          vul_rc=$?
          if [ "$vul_rc" -ne 0 ] || [ "$dep_rc" -ne 0 ]; then
            echo "vulture=$vul_rc, deptry=$dep_rc"
            exit 1
          fi

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-python: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Tests with coverage
        run: |
          uv run pytest tests/ \
            --cov=irodori_tts_infra \
            --cov-report=term-missing \
            --cov-report=xml:reports/coverage.xml

  quality-gates:
    name: Quality gates
    runs-on: ubuntu-24.04
    needs: [lint, test]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || [ "${{ needs.test.result }}" != "success" ]; then
            echo "lint: ${{ needs.lint.result }}"
            echo "test: ${{ needs.test.result }}"
            exit 1
          fi
